<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Luxury Villa VR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <script>
    AFRAME.registerComponent('teleport-to', {
      schema: { to: { type: 'vec3' } },
      init: function () {
        this.el.addEventListener('click', () => {
          const rig = document.querySelector('#cameraRig');
          if (rig) rig.setAttribute('position', this.data.to);
        });
      }
    });

    AFRAME.registerComponent('model-check', {
      init: function () {
        this.el.addEventListener('model-loaded', () => console.log('✅ MODEL LOADED'));
        this.el.addEventListener('model-error',  () => console.log('❌ MODEL FAILED'));
      }
    });

    AFRAME.registerComponent('free-move', {
      init: function () {
        this.keys = {};
        this.speed = 0.7;
        window.addEventListener('keydown', (e) => {
          this.keys[e.code] = true;
          if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.key)) {
            e.preventDefault();
          }
        });
        window.addEventListener('keyup', (e) => { this.keys[e.code] = false; });
        window.addEventListener('wheel', (e) => {
          const pos = this.el.getAttribute('position');
          pos.y -= e.deltaY * 0.05;
          this.el.setAttribute('position', pos);
        });
      },
      tick: function () {
        const el  = this.el;
        const pos = el.getAttribute('position');
        const cam = el.querySelector('[camera]');
        const s   = this.speed;
        let yaw = 0;
        if (cam) {
          const rot = cam.getAttribute('rotation');
          yaw = (rot ? rot.y : 0) * Math.PI / 180;
        }
        if (this.keys['KeyW'] || this.keys['ArrowUp'])    { pos.x -= Math.sin(yaw)*s; pos.z -= Math.cos(yaw)*s; }
        if (this.keys['KeyS'] || this.keys['ArrowDown'])  { pos.x += Math.sin(yaw)*s; pos.z += Math.cos(yaw)*s; }
        if (this.keys['KeyA'] || this.keys['ArrowLeft'])  { pos.x -= Math.cos(yaw)*s; pos.z += Math.sin(yaw)*s; }
        if (this.keys['KeyD'] || this.keys['ArrowRight']) { pos.x += Math.cos(yaw)*s; pos.z -= Math.sin(yaw)*s; }
        if (this.keys['KeyQ'] || this.keys['Space']    || this.keys['PageUp'])   pos.y += s;
        if (this.keys['KeyE'] || this.keys['ShiftLeft'] || this.keys['PageDown']) pos.y -= s;
        el.setAttribute('position', pos);
      }
    });

    // SLOW WALKING DOG
    AFRAME.registerComponent('dog-walk', {
      init: function () {
        this.t   = 0;
        this.dir = 1;
      },
      tick: function (time, delta) {
        // speed reduced — 0.00008 instead of 0.001
        this.t += delta * 0.00008 * this.dir;
        if (this.t > 1) { this.t = 1; this.dir = -1; }
        if (this.t < 0) { this.t = 0; this.dir =  1; }
        const x  = -25 + this.t * 50;
        this.el.setAttribute('position', `${x} 0 40`);
        const ry = this.dir === 1 ? 90 : -90;
        this.el.setAttribute('rotation', `0 ${ry} 0`);
      }
    });
  </script>
</head>
