<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>House Preview - A-Frame</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
      AFRAME.registerComponent('teleport-to', {
        schema: { to: {type: 'vec3'} },
        init: function () {
          this.el.addEventListener('click', () => {
            const rig = document.querySelector('#cameraRig');
            if (rig) {
              rig.setAttribute('position', this.data.to);
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene background="color: #87CEEB">

      <a-assets>
        <img id="concrete" src="textures/concrete.jpg">
        <img id="sky" src="textures/sky-clouds.jpg">
        <img id="floor" src="textures/floor.jpg">
        
      </a-assets>

      <a-entity light="type: hemisphere; color: #FFD580; groundColor: #8B7355; intensity: 0.05"></a-entity>


      <a-entity id="cameraRig" position="-89 15 20" rotation="0 180 0" >
        <a-camera look-controls="pointerLockEnabled: false; enableMouse: true"
                  wasd-controls="acceleration: 200">
          <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
        </a-camera>
      </a-entity>

      <a-entity gltf-model="url(./models/garden._park._landscape.13.glb)"
                position="0 0 0" 
                rotation="0 0 0" 
                scale="1 1 1">
      </a-entity>

      <a-entity gltf-model="url(./models/bali_villa_compressed.glb)"
                position="0 -0.01 12"
                rotation="0 180 0"
                scale="0.18 0.18 0.18"
                static-body>
      </a-entity>

       <a-entity gltf-model="url(./models/car_compressed.glb)"
                position="-28 0 80"
                rotation="0 180 0"
                scale="6 6  6">
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.8"></a-entity>
      <a-entity light="type: directional; intensity: 0.7; castShadow: true"
                position="0 10 10"></a-entity>
      <a-entity light="type: directional; intensity: 0.4"
                position="-5 5 5"></a-entity>

      <a-sky src="#sky"></a-sky>

      <a-entity id="villa-wall" position="0 2.5 12">
        <a-box position="-98 0 294" width="185" height="75" depth="1" material="src: #concrete; repeat: 10 5"></a-box>
        <a-box position="-5 0 165" width="1" height="75" depth="260" material="src: #concrete; repeat: 10 5"></a-box>
        <a-box position="-190 0 165" width="1" height="75" depth="260" material="src: #concrete; repeat: 10 5"></a-box>
      </a-entity>

      <a-entity id="room-labels">
        <a-entity class="clickable" teleport-to="to: -4 2 15" position="-10 3 20">
          <a-plane width="4" height="1" color="#222" opacity="0.8"></a-plane>
          <a-text value="Living Room" color="#FFF" align="center" width="3.5" position="0 0 0.01"></a-text>
        </a-entity>
        <a-entity class="clickable" teleport-to="to: 5 4 10" position="10 3 18">
          <a-plane width="4" height="1" color="#222" opacity="0.8"></a-plane>
          <a-text value="Master Bedroom" color="#FFF" align="center" width="3.5" position="0 0 0.01"></a-text>
        </a-entity>
        <a-entity class="clickable" teleport-to="to: 0 2 25" position="0 3 8">
          <a-plane width="4" height="1" color="#222" opacity="0.8"></a-plane>
          <a-text value="Kitchen" color="#FFF" align="center" width="3.5" position="0 0 0.01"></a-text>
        </a-entity>
      </a-entity>

      <a-plane rotation="-90 0 0" width="4000" height="4000" position="0 -0.01 0"
                material="src: #floor; repeat: 400 400; roughness: 0.9; metalness: 0; color: #888888"
               shadow></a-plane>
    </a-scene>
  </body>
</html>
